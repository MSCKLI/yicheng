<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐕 汪汪队班级管理系统 PRO - PAW PATROL</title>
<style>
/* ==================== 科技感全局样式 ==================== */
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
:root {
  --primary: #00d4ff;
  --secondary: #7b2cbf;
  --accent: #ff6b35;
  --success: #00ff88;
  --warning: #ffd60a;
  --danger: #ff4757;
  --bg-dark: #0a0a1a;
  --bg-card: rgba(20, 20, 40, 0.8);
  --glow: 0 0 20px var(--primary);
}

html, body { 
  width: 100%; height: 100%; overflow: hidden; 
  font-family: 'Orbitron', 'Microsoft YaHei', sans-serif;
  background: var(--bg-dark);
  color: #fff;
}

/* 科技感背景 */
.tech-bg {
  position: fixed; inset: 0; z-index: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(123, 44, 191, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
}

/* 扫描线效果 */
.scanlines {
  position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 212, 255, 0.03) 2px,
    rgba(0, 212, 255, 0.03) 4px
  );
  pointer-events: none;
}

/* 网格背景 */
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

/* ==================== 顶部导航 - 科技风 ==================== */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0.8) 100%);
  border-bottom: 2px solid var(--primary);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 30px; z-index: 100;
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
}

.logo-section {
  display: flex; align-items: center; gap: 20px;
}

.logo-icon {
  font-size: 3rem;
  filter: drop-shadow(0 0 15px var(--primary));
  animation: logoGlow 2s ease-in-out infinite;
}
@keyframes logoGlow {
  0%, 100% { filter: drop-shadow(0 0 15px var(--primary)); transform: scale(1); }
  50% { filter: drop-shadow(0 0 30px var(--primary)); transform: scale(1.05); }
}

.logo-text {
  font-size: 1.8rem; font-weight: bold; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px var(--primary);
}

.class-badge {
  padding: 8px 20px;
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
  border: 1px solid var(--primary);
  border-radius: 25px;
  font-size: 1rem;
  color: var(--primary);
  box-shadow: var(--glow);
}

.nav-btns { display: flex; gap: 10px; flex-wrap: wrap; }

.nav-btn {
  padding: 12px 20px; 
  border: 2px solid rgba(0, 212, 255, 0.5);
  background: rgba(0, 212, 255, 0.1);
  color: var(--primary);
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; border-radius: 8px;
  transition: all 0.3s;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.nav-btn:hover {
  background: rgba(0, 212, 255, 0.3);
  border-color: var(--primary);
  box-shadow: var(--glow), inset 0 0 20px rgba(0, 212, 255, 0.2);
  transform: translateY(-2px);
}
.nav-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-color: var(--primary);
  color: #000;
  box-shadow: var(--glow);
}
.nav-btn.teacher {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255, 107, 53, 0.1);
}
.nav-btn.teacher:hover, .nav-btn.teacher.active {
  background: linear-gradient(135deg, var(--accent), #ff8c42);
  color: #000;
  box-shadow: 0 0 20px var(--accent);
}
.nav-btn.primary {
  background: linear-gradient(135deg, var(--accent), #ff8c42);
  color: #000;
  font-weight: bold;
}

/* 下拉菜单 */
.dropdown-menu {
  position: fixed;
  top: 70px;
  right: 20px;
  background: rgba(10, 10, 26, 0.98);
  border: 2px solid var(--primary);
  border-radius: 15px;
  padding: 10px;
  z-index: 1000;
  min-width: 150px;
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
}
.dropdown-item {
  display: block;
  width: 100%;
  padding: 12px 20px;
  background: transparent;
  border: none;
  color: #fff;
  text-align: left;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 1rem;
}
.dropdown-item:hover {
  background: rgba(0, 212, 255, 0.2);
  color: var(--primary);
}

/* ==================== 主内容区 ==================== */
#mainContent {
  position: fixed; top: 80px; left: 0; right: 0; bottom: 0;
  display: flex; z-index: 10;
}

/* 左侧面板 */
#leftPanel {
  width: 300px;
  background: var(--bg-card);
  border-right: 1px solid rgba(0, 212, 255, 0.3);
  display: flex; flex-direction: column;
  padding: 20px;
  backdrop-filter: blur(10px);
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 15px; padding-bottom: 10px;
  border-bottom: 1px solid rgba(0, 212, 255, 0.3);
}

.panel-title {
  font-size: 1.2rem; color: var(--primary);
  display: flex; align-items: center; gap: 10px;
  text-shadow: 0 0 10px var(--primary);
}

.team-badge {
  padding: 4px 12px; border-radius: 15px;
  font-size: 0.75rem; font-weight: bold;
  box-shadow: 0 0 10px currentColor;
}
.team-badge.red { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; }
.team-badge.blue { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #000; }
.team-badge.green { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #000; }
.team-badge.yellow { background: linear-gradient(135deg, #ffd60a, #ffaa00); color: #000; }

/* 学生卡片 */
#studentList {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}

.student-card {
  background: rgba(0, 212, 255, 0.05);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 15px; padding: 15px;
  cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; gap: 15px;
}
.student-card:hover {
  background: rgba(0, 212, 255, 0.15);
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
  transform: translateX(5px);
}
.student-card.selected {
  background: rgba(0, 212, 255, 0.2);
  border-color: var(--primary);
  box-shadow: var(--glow);
}

.student-avatar {
  width: 55px; height: 55px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
}

.student-info { flex: 1; min-width: 0; }

.student-name {
  font-size: 1.1rem; color: #fff; font-weight: bold;
}

.student-pet-name {
  font-size: 0.85rem; color: rgba(255,255,255,0.6);
  margin-top: 3px;
}

.student-level {
  display: inline-block;
  padding: 3px 10px; border-radius: 10px;
  font-size: 0.75rem;
  background: linear-gradient(135deg, var(--secondary), #9b59b6);
  color: #fff; font-weight: bold;
  box-shadow: 0 0 10px rgba(123, 44, 191, 0.5);
}

.student-score {
  font-size: 1.3rem; color: var(--warning);
  font-weight: bold; text-shadow: 0 0 10px var(--warning);
}

/* 中间展示区 */
#centerStage {
  flex: 1; display: flex; flex-direction: column;
  padding: 15px;
  min-width: 720px;
}

.stage-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 15px;
}

.stage-title {
  font-size: 1.4rem; color: var(--primary);
  display: flex; align-items: center; gap: 15px;
  text-shadow: 0 0 15px var(--primary);
}

/* 宠物展示大屏 */
#petDisplay {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: var(--bg-card);
  border-radius: 20px;
  border: 2px solid rgba(0, 212, 255, 0.3);
  position: relative; overflow: hidden;
  box-shadow: 
    inset 0 0 50px rgba(0, 212, 255, 0.1),
    0 0 30px rgba(0, 212, 255, 0.2);
  min-height: 450px;
}

#petDisplay::before {
  content: '';
  position: absolute; inset: 0;
  background: 
    linear-gradient(45deg, transparent 40%, rgba(0, 212, 255, 0.1) 50%, transparent 60%);
  background-size: 200% 200%;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 200%; }
  100% { background-position: -200% -200%; }
}

#petCanvas {
  position: relative; z-index: 2;
  width: 700px; height: 500px;
}

/* 场景指示器 */
.scene-indicator {
  position: absolute; top: 15px; left: 15px;
  background: rgba(10, 10, 26, 0.9);
  border: 2px solid var(--primary);
  border-radius: 25px; padding: 10px 20px;
  display: flex; align-items: center; gap: 10px;
  z-index: 10;
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}
.scene-icon { font-size: 1.5rem; }
.scene-name { 
  color: var(--primary); font-weight: bold;
  text-shadow: 0 0 10px var(--primary);
}

/* 场景控制按钮 */
.scene-controls {
  position: absolute; top: 15px; right: 15px;
  display: flex; gap: 8px;
  z-index: 10;
}
.scene-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid rgba(0, 212, 255, 0.5);
  background: rgba(10, 10, 26, 0.9);
  color: #fff; font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.3s;
}
.scene-btn:hover {
  border-color: var(--primary);
  box-shadow: 0 0 15px var(--primary);
  transform: scale(1.1);
}
.scene-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 20px var(--primary);
}

/* 装备槽位 */
.equipment-slots {
  background: rgba(0, 212, 255, 0.05);
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: 20px; padding: 15px;
  margin: 15px 0;
}
.slot-row {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap;
}
.equip-slot {
  width: 90px; height: 100px;
  background: rgba(10, 10, 26, 0.8);
  border: 2px solid rgba(0, 212, 255, 0.3);
  border-radius: 15px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.equip-slot:hover {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
  transform: translateY(-3px);
}
.equip-slot.equipped {
  border-color: var(--success);
