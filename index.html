<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI驱动的银耳成长系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            color: white;
            text-align: center;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="white" opacity="0.3"/><circle cx="50" cy="50" r="1" fill="white" opacity="0.5"/><circle cx="80" cy="20" r="1.5" fill="white" opacity="0.4"/></svg>');
            background-size: 100px 100px;
        }
        
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        
        .main-content {
            display: flex;
            padding: 20px;
            gap: 20px;
        }
        
        .character-section {
            flex: 1;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }
        
        .character-display {
            width: 250px;
            height: 300px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8em;
            border: 8px solid #ffecd2;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }
        
        .character-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            z-index: 1;
        }
        
        .character-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .character-stats {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: left;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px dashed #ddd;
        }
        
        .progress-section {
            flex: 2;
            padding: 20px;
        }
        
        .progress-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .progress-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .progress-bars {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        
        .progress-bar-group {
            margin-bottom: 15px;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .progress-bar {
            height: 25px;
            background: #e9ecef;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b09b, #96c93d);
            border-radius: 12px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .actions-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
            font-weight: bold;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-listen { 
            background: linear-gradient(45deg, #ff9a9e, #fad0c4); 
            color: #333; 
        }
        .btn-clean { 
            background: linear-gradient(45deg, #a8edea, #fed6e3); 
            color: #333; 
        }
        .btn-help { 
            background: linear-gradient(45deg, #ffecd2, #fcb69f); 
            color: #333; 
        }
        .btn-special { 
            background: linear-gradient(45deg, #667eea, #764ba2); 
            color: white; 
        }
        .btn-reset { 
            background: linear-gradient(45deg, #ff9a9e, #fecfef); 
            color: white; 
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .log-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .log-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .log-entries {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 10px;
        }
        
        .log-entry {
            padding: 10px;
            margin: 8px 0;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #00b09b;
            animation: slideIn 0.5s ease;
            font-size: 0.9em;
        }
        
        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateX(-20px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }
        
        .shop-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .shop-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }
        
        .shop-item {
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .shop-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: left 0.5s;
        }
        
        .shop-item:hover::before {
            left: 100%;
        }
        
        .shop-item:hover {
            transform: scale(1.05);
            border-color: #00b09b;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .shop-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .shop-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        .shop-price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .equipped {
            border-color: #27ae60 !important;
            background: linear-gradient(45deg, #e8f5e8, #d4edda);
        }
        
        .ai-dialogue {
            background: #f0f8ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #4a90e2;
            font-style: italic;
            color: #2c3e50;
        }
        
        .ai-avatar {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #4a90e2;
            border-radius: 50%;
            color: white;
            text-align: center;
            line-height: 30px;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .character-display {
                width: 200px;
                height: 250px;
                font-size: 6em;
            }
            
            .action-buttons {
                grid-template-columns: 1fr;
            }
        }
        
        .character-animation {
            animation: breathe 3s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI驱动的银耳成长系统</h1>
            <p>让虚拟人物更像真人，见证每一份努力与成长</p>
        </div>
        
        <div class="main-content">
            <div class="character-section">
                <div class="character-display character-animation">
                    👶
                </div>
                <div class="character-name">银耳</div>
                <div class="character-stats">
                    <div class="stat-row">
                        <span>当前阶段：</span>
                        <span id="current-stage">婴儿阶段</span>
                    </div>
                    <div class="stat-row">
                        <span>成长等级：</span>
                        <span id="level">1</span>
                    </div>
                    <div class="stat-row">
                        <span>总积分：</span>
                        <span id="total-points">0</span>
                    </div>
                    <div class="stat-row">
                        <span>装备道具：</span>
                        <span id="equipped-count">0</span>
                    </div>
                </div>
                
                <div class="ai-dialogue">
                    <span class="ai-avatar">AI</span>
                    <span id="ai-message">你好！我是银耳，正在开始我的成长之旅。每天认真学习、帮助他人，让我变得越来越好！</span>
                </div>
            </div>
            
            <div class="progress-section">
                <div class="progress-container">
                    <div class="progress-title">📊 成长进度追踪</div>
                    <div class="progress-bars">
                        <div class="progress-bar-group">
                            <div class="progress-label">
                                <span>总成长进度</span>
                                <span><span id="total-progress-percent">0</span>%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="total-progress" style="width: 0%">0%</div>
                            </div>
                        </div>
                        
                        <div class="progress-bar-group">
                            <div class="progress-label">
                                <span>听课积分</span>
                                <span><span id="listen-points">0</span>/300</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="listen-progress" style="width: 0%">0%</div>
                            </div>
                        </div>
                        
                        <div class="progress-bar-group">
                            <div class="progress-label">
                                <span>卫生积分</span>
                                <span><span id="clean-points">0</span>/300</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="clean-progress" style="width: 0%">0%</div>
                            </div>
                        </div>
                        
                        <div class="progress-bar-group">
                            <div class="progress-label">
                                <span>助人积分</span>
                                <span><span id="help-points">0</span>/400</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="help-progress" style="width: 0%">0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="actions-section">
                    <h3>💪 日常成长行动</h3>
                    <div class="action-buttons">
                        <button class="btn btn-listen" onclick="performAction('listen')">
                            👂 认真听课 (+10积分)
                        </button>
                        <button class="btn btn-clean" onclick="performAction('clean')">
                            🧹 主动清洁 (+15积分)
                        </button>
                        <button class="btn btn-help" onclick="performAction('help')">
                            🤝 热心助人 (+20积分)
                        </button>
                        <button class="btn btn-special" onclick="performSpecialAction()">
                            ⭐ 特殊任务 (+30积分)
                        </button>
                        <button class="btn btn-reset" onclick="resetGame()">
                            🔄 重新开始
                        </button>
                    </div>
                </div>
                
                <div class="shop-section">
                    <div class="shop-title">🛍️ 个性化装扮商城</div>
                    <div class="shop-items" id="shop-items">
                        <!-- Shop items will be generated by JavaScript -->
                    </div>
                </div>
                
                <div class="log-section">
                    <div class="log-title">📝 成长日志</div>
                    <div class="log-entries" id="activity-log">
                        <div class="log-entry">欢迎来到AI驱动的银耳成长系统！开始你的成长之旅吧！</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            totalPoints: 0,
            listenPoints: 0,
            cleanPoints: 0,
            helpPoints: 0,
            level: 1,
            currentStage: '婴儿',
            characterEmoji: '👶',
            equippedItems: [],
            experience: 0,
            maxExperience: 100
        };

        // 成长阶段配置
        const stages = [
            { 
                name: '婴儿', 
                emoji: '👶', 
                minLevel: 1, 
                maxLevel: 3, 
                desc: '需要呵护的小婴儿，从基础积分开始累积',
                aiMessage: '我还在学习如何更好地成长呢！'
            },
            { 
                name: '幼儿', 
                emoji: '🧒', 
                minLevel: 4, 
                maxLevel: 6, 
                desc: '活泼可爱的幼儿，积分获取更加丰富',
                aiMessage: '我已经学会了很多新本领！'
            },
            { 
                name: '少年', 
                emoji: '👦', 
                minLevel: 7, 
                maxLevel: 9, 
                desc: '天真烂漫的少年，可以兑换专属服装道具',
                aiMessage: '我正在努力成为更好的自己！'
            },
            { 
                name: '青年', 
                emoji: '👨', 
                minLevel: 10, 
                maxLevel: 10, 
                desc: '独立自信的青年，持续积累成长积分',
                aiMessage: '我已经成长为一个独立自信的人了！'
            }
        ];

        // 商城商品
        const shopItems = [
            { id: 1, name: '智慧眼镜', icon: '👓', price: 100, category: 'glasses', effect: '听课效率+10%' },
            { id: 2, name: '爱心徽章', icon: '❤️', price: 150, category: 'badge', effect: '助人积分+15%' },
            { id: 3, name: '环保书包', icon: '🎒', price: 200, category: 'bag', effect: '卫生积分+20%' },
            { id: 4, name: '运动鞋', icon: '👟', price: 250, category: 'shoes', effect: '行动效率+15%' },
            { id: 5, name: '魔法棒', icon: '✨', price: 300, category: 'tool', effect: '特殊任务奖励+25%' },
            { id: 6, name: '智慧王冠', icon: '👑', price: 500, category: 'crown', effect: '全属性+10%' }
        ];

        // AI对话库
        const aiMessages = [
            "今天我学会了新的知识，感觉很充实！",
            "帮助别人让我感到很快乐！",
            "保持教室整洁是我的责任。",
            "我要继续努力，让自己变得更好！",
            "和同学们一起学习真开心！",
            "我相信坚持就是胜利！",
            "每天进步一点点，积累起来就是大进步！",
            "困难面前我不怕，勇敢面对挑战！"
        ];

        // 初始化游戏
        function initGame() {
            updateDisplay();
            renderShopItems();
            addLogEntry('AI驱动的银耳成长系统已启动！');
            startAIPeriodicUpdates();
        }

        // 执行行动
        function performAction(type) {
            let pointsToAdd = 0;
            let actionName = '';
            
            switch(type) {
                case 'listen':
                    pointsToAdd = Math.floor(Math.random() * 10) + 5; // 5-15积分
                    actionName = '听课';
                    gameState.listenPoints += pointsToAdd;
                    break;
                case 'clean':
                    pointsToAdd = Math.floor(Math.random() * 10) + 10; // 10-20积分
                    actionName = '清洁';
                    gameState.cleanPoints += pointsToAdd;
                    break;
                case 'help':
                    pointsToAdd = Math.floor(Math.random() * 15) + 10; // 10-25积分
                    actionName = '助人';
                    gameState.helpPoints += pointsToAdd;
                    break;
            }
            
            gameState.totalPoints += pointsToAdd;
            updateLevel();
            updateDisplay();
            addLogEntry(`✅ ${actionName}行动成功！获得 ${pointsToAdd} 积分`);
            
            // 随机AI反应
            if (Math.random() > 0.7) {
                showRandomAIMessage();
            }
        }

        // 执行特殊行动
        function performSpecialAction() {
            const specialPoints = Math.floor(Math.random() * 20) + 20; // 20-40积分
            gameState.totalPoints += specialPoints;
            updateLevel();
            updateDisplay();
            addLogEntry(`⭐ 完成特殊任务！获得 ${specialPoints} 积分`);
            showAIMessage('我完成了特殊任务，感觉自己变得更强大了！');
        }

        // 更新等级
        function updateLevel() {
            const newLevel = Math.min(Math.floor(gameState.totalPoints / 100) + 1, 10);
            if (newLevel !== gameState.level) {
                gameState.level = newLevel;
                updateCharacterStage();
                addLogEntry(`🎉 恭喜升级到第 ${newLevel} 级！`);
            }
        }

        // 更新角色阶段
        function updateCharacterStage() {
            const stage = stages.find(s => gameState.level >= s.minLevel && gameState.level <= s.maxLevel);
            if (stage && stage.name !== gameState.currentStage) {
                gameState.currentStage = stage.name;
                gameState.characterEmoji = stage.emoji;
                showAIMessage(stage.aiMessage);
                updateDisplay();
            }
        }

        // 购买商品
        function buyItem(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            if (!item) return;
            
            if (gameState.totalPoints >= item.price) {
                gameState.totalPoints -= item.price;
                gameState.equippedItems.push(item.id);
                updateLevel(); // 重新计算等级
                updateDisplay();
                addLogEntry(`🛍️ 成功购买 ${item.name}！花费 ${item.price} 积分`);
                showAIMessage(`我用积分换到了${item.name}，真是太棒了！`);
            } else {
                addLogEntry(`❌ 积分不足，无法购买 ${item.name}（需要 ${item.price} 积分）`);
                showAIMessage(`我还差一些积分才能买到${item.name}，加油努力！`);
            }
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('total-points').textContent = gameState.totalPoints;
            document.getElementById('listen-points').textContent = gameState.listenPoints;
            document.getElementById('clean-points').textContent = gameState.cleanPoints;
            document.getElementById('help-points').textContent = gameState.helpPoints;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('current-stage').textContent = `${gameState.characterEmoji} ${gameState.currentStage}阶段`;
            document.getElementById('equipped-count').textContent = gameState.equippedItems.length;
            
            // 更新角色显示
            document.querySelector('.character-display').textContent = gameState.characterEmoji;
            
            // 更新进度条
            const totalProgressPercent = Math.min((gameState.totalPoints / 1000) * 100, 100);
            document.getElementById('total-progress').style.width = totalProgressPercent + '%';
            document.getElementById('total-progress').textContent = Math.round(totalProgressPercent) + '%';
            document.getElementById('total-progress-percent').textContent = Math.round(totalProgressPercent);
            
            // 更新各类型进度
            document.getElementById('listen-progress').style.width = Math.min((gameState.listenPoints / 300) * 100, 100) + '%';
            document.getElementById('listen-progress').textContent = Math.round(Math.min((gameState.listenPoints / 300) * 100, 100)) + '%';
            
            document.getElementById('clean-progress').style.width = Math.min((gameState.cleanPoints / 300) * 100, 100) + '%';
            document.getElementById('clean-progress').textContent = Math.round(Math.min((gameState.cleanPoints / 300) * 100, 100)) + '%';
            
            document.getElementById('help-progress').style.width = Math.min((gameState.helpPoints / 400) * 100, 100) + '%';
            document.getElementById('help-progress').textContent = Math.round(Math.min((gameState.helpPoints / 400) * 100, 100)) + '%';
            
            // 更新商城显示
            updateShopDisplay();
        }

        // 更新商城显示
        function updateShopDisplay() {
            const shopContainer = document.getElementById('shop-items');
            shopContainer.innerHTML = '';
            
            shopItems.forEach(item => {
                const itemElement = document.createElement('div');
                itemElement.className = 'shop-item';
                if (gameState.equippedItems.includes(item.id)) {
                    itemElement.classList.add('equipped');
                }
                
                itemElement.innerHTML = `
                    <div class="shop-icon">${item.icon}</div>
                    <div class="shop-name">${item.name}</div>
                    <div class="shop-price">${item.price} 积分</div>
                    <div style="font-size: 0.8em; color: #666;">${item.effect}</div>
                `;
                
                itemElement.onclick = () => buyItem(item.id);
                shopContainer.appendChild(itemElement);
            });
        }

        // 渲染商城商品
        function renderShopItems() {
            updateShopDisplay();
        }

        // 添加日志
        function addLogEntry(message) {
            const logContainer = document.getElementById('activity-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.insertBefore(entry, logContainer.firstChild);
            
            // 限制日志数量
            if (logContainer.children.length > 15) {
                logContainer.removeChild(logContainer.lastChild);
            }
            
            // 滚动到底部
            logContainer.scrollTop = 0;
        }

        // 显示AI消息
        function showAIMessage(message) {
            document.getElementById('ai-message').textContent = message;
        }

        // 显示随机AI消息
        function showRandomAIMessage() {
            const randomMessage = aiMessages[Math.floor(Math.random() * aiMessages.length)];
            showAIMessage(randomMessage);
        }

        // 启动AI定期更新
        function startAIPeriodicUpdates() {
            setInterval(() => {
                if (Math.random() > 0.8) { // 20%概率触发
                    showRandomAIMessage();
                }
            }, 8000); // 每8秒检查一次
        }

        // 重置游戏
        function resetGame() {
            if (confirm('确定要重新开始吗？所有进度将被重置。')) {
                gameState = {
                    totalPoints: 0,
                    listenPoints: 0,
                    cleanPoints: 0,
                    helpPoints: 0,
                    level: 1,
                    currentStage: '婴儿',
                    characterEmoji: '👶',
                    equippedItems: [],
                    experience: 0,
                    maxExperience: 100
                };
                
                updateDisplay();
                addLogEntry('游戏已重置，重新开始成长之旅！');
                showAIMessage('让我们重新开始，创造新的美好回忆！');
            }
        }

        // 初始化游戏
        window.onload = initGame;
    </script>
</body>
</html>
